<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>極・開運おみくじ</title>
  <style>
    /* デザインシステム定義（伝統的日本建築・神社の色彩を再現） */
    :root {
      --primary-red: #e60012; /* 朱色 */
      --deep-red: #8c0000;
      --gold: #d4af37;
      --charcoal: #2b2b2b;
      --soft-white: #fcfaf2; /* しっくい色 */
      --shadow-color: rgba(0, 0, 0, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background-color: var(--soft-white);
      color: var(--charcoal);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* メインコンテナ */
   .app-container {
      background: #ffffff;
      border: 8px double var(--deep-red);
      border-radius: 12px;
      width: 100%;
      max-width: 500px;
      padding: 30px 20px;
      box-shadow: 0 10px 30px var(--shadow-color);
      text-align: center;
      position: relative;
    }

    /* ヘッダーデザイン */
   .header {
      margin-bottom: 30px;
      border-bottom: 2px dashed var(--gold);
      padding-bottom: 15px;
    }

   .header h1 {
      font-size: 24px;
      color: var(--deep-red);
      letter-spacing: 0.2em;
      margin-bottom: 5px;
    }

   .header p {
      font-size: 12px;
      color: #666;
    }

    /* メイン表示エリア */
   .display-area {
      min-height: 160px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin-bottom: 35px;
      padding: 15px;
      border-radius: 8px;
      background: #faf8f5;
      border: 1px solid #eee;
    }

    /* おみくじ結果表示 */
   .fortune-result {
      font-size: 48px;
      font-weight: 900;
      color: var(--primary-red);
      letter-spacing: 0.1em;
      margin-bottom: 15px;
      transform: scale(0);
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

   .fortune-result.show {
      transform: scale(1);
    }

    /* プレースホルダー（初期状態のテキスト） */
   .placeholder-text {
      color: #888;
      font-size: 16px;
      line-height: 1.6;
    }

    /* カテゴリ詳細リスト */
   .category-list {
      width: 100%;
      display: none;
      text-align: left;
      margin-top: 15px;
    }

   .category-list.show {
      display: block;
      animation: fadeIn 0.8s ease forwards;
    }

   .category-item {
      background: #ffffff;
      border-left: 4px solid var(--gold);
      padding: 10px 15px;
      margin-bottom: 10px;
      border-radius: 0 6px 6px 0;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

   .category-name {
      font-weight: bold;
      font-size: 14px;
      color: var(--deep-red);
      margin-bottom: 3px;
    }

   .category-text {
      font-size: 13px;
      color: #444;
      line-height: 1.5;
    }

    /* 矢印付き赤い操作ボタン領域 */
   .action-container {
      position: relative;
      margin-top: 20px;
      display: inline-block;
      width: 100%;
    }

    /* 動的フローティング矢印（ボタンへの視線誘導） */
   .floating-arrow {
      position: absolute;
      top: -45px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      color: var(--primary-red);
      animation: bounce 1.2s infinite;
      pointer-events: none;
    }

    /* おみくじを引くボタン（朱色） */
   .btn-draw {
      background-color: var(--primary-red);
      color: #ffffff;
      border: none;
      border-bottom: 4px solid var(--deep-red);
      border-radius: 50px;
      width: 85%;
      max-width: 320px;
      padding: 16px 30px;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 0.1em;
      cursor: pointer;
      outline: none;
      box-shadow: 0 4px 10px rgba(230, 0, 18, 0.3);
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* ボタン内の内蔵矢印 */
   .btn-draw.inner-arrow {
      margin-left: 10px;
      font-size: 20px;
      transition: transform 0.2s ease;
    }

   .btn-draw:hover {
      background-color: #ff1a2b;
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(230, 0, 18, 0.4);
    }

   .btn-draw:hover.inner-arrow {
      transform: translateX(4px);
    }

   .btn-draw:active {
      transform: translateY(2px);
      border-bottom-width: 1px;
      box-shadow: 0 2px 5px rgba(230, 0, 18, 0.2);
    }

    /* ロード・シャッフルアニメーション */
   .shuffling {
      animation: shake 0.3s infinite;
    }

    /* 各種アニメーションキーフレーム */
    @keyframes bounce {
      0%, 100% {
        transform: translate(-50%, 0);
      }
      50% {
        transform: translate(-50%, -10px);
      }
    }

    @keyframes shake {
      0% { transform: translate(1px, 1px) rotate(0deg); }
      10% { transform: translate(-1px, -2px) rotate(-1deg); }
      20% { transform: translate(-3px, 0px) rotate(1deg); }
      30% { transform: translate(0px, 2px) rotate(0deg); }
      40% { transform: translate(1px, -1px) rotate(1deg); }
      50% { transform: translate(-1px, 2px) rotate(-1deg); }
      60% { transform: translate(-3px, 1px) rotate(0deg); }
      70% { transform: translate(2px, 1px) rotate(-1deg); }
      80% { transform: translate(-1px, -1px) rotate(1deg); }
      90% { transform: translate(2px, 2px) rotate(0deg); }
      100% { transform: translate(1px, -2px) rotate(-1deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="header">
      <h1>極・開運御籤</h1>
      <p>心を落ち着かせ、ボタンを押しておみくじをお引きください</p>
    </div>

    <div id="displayArea" class="display-area">
      <div id="placeholderText" class="placeholder-text">
        神社の神聖な気が満ちています。<br>下の赤いボタンを押して運勢を占ってください。
      </div>
      <div id="fortuneResult" class="fortune-result">大吉</div>
    </div>

    <div id="categoryList" class="category-list">
      <div class="category-item">
        <div class="category-name">👔 仕事運</div>
        <div id="commentWork" class="category-text"></div>
      </div>
      <div class="category-item">
        <div class="category-name">💖 恋愛運</div>
        <div id="commentLove" class="category-text"></div>
      </div>
      <div class="category-item">
        <div class="category-name">✍ 勉学運</div>
        <div id="commentStudy" class="category-text"></div>
      </div>
      <div class="category-item">
        <div class="category-name">💍 結婚運</div>
        <div id="commentMarriage" class="category-text"></div>
      </div>
      <div class="category-item">
        <div class="category-name">🏡 転居運</div>
        <div id="commentRelocation" class="category-text"></div>
      </div>
    </div>

    <div class="action-container">
      <div class="floating-arrow" id="floatingArrow">👇</div>
      <button id="btnDraw" class="btn-draw" aria-label="おみくじを引く">
        おみくじを引く <span class="inner-arrow">➔</span>
      </button>
    </div>
  </div>

  <script>
    /**
     * 1. ライフサイクル管理
     * DOMContentLoadedイベントリスナーにより、すべてのDOMがメモリ上に完全に展開された後に実行を保証。
     * これにより、初期スクリプト実行によるDOM取得エラー（Null Pointer Exception）を物理的に排除する。
     */
    window.addEventListener('DOMContentLoaded', function() {
      
      // 2. DOM要素の厳密な参照確保
      const btnDraw = document.getElementById('btnDraw');
      const displayArea = document.getElementById('displayArea');
      const placeholderText = document.getElementById('placeholderText');
      const fortuneResult = document.getElementById('fortuneResult');
      const categoryList = document.getElementById('categoryList');
      const floatingArrow = document.getElementById('floatingArrow');

      const commentWork = document.getElementById('commentWork');
      const commentLove = document.getElementById('commentLove');
      const commentStudy = document.getElementById('commentStudy');
      const commentMarriage = document.getElementById('commentMarriage');
      const commentRelocation = document.getElementById('commentRelocation');

      // 取得失敗時のセーフティガード（万一のマークアップ改変時のフリーズ防止）
      if (!btnDraw ||!displayArea ||!fortuneResult ||!categoryList) {
        console.error("致命的な初期化エラー: 必須のDOM要素が見つかりません。");
        return;
      }

      /**
       * 3. おみくじの確率設定と多次元テキストプール
       * 各運勢にそれぞれ紐づく、カテゴリごとの複数コメント候補群を構造化して定義する。
       * 運勢によって自動的にプールが決定され、その中からさらに確率的に1つがランダム選択される。
       */
      const fortuneDatabase = {
        '大吉': {
          color: '#e60012',
          comments: {
            work: [
              'これまでの努力が最上の形で実を結びます。重要な決断を下すのに最良の好機です。',
              '直感と判断力が極限まで冴え渡ります。発案したアイデアが周囲に大絶賛されるでしょう。'
            ],
            love: [
              '運命的な出会いが目前に迫っています。自ら心を開くことで最高の縁が繋がります。',
              '理想以上の相手との親密な関係が急速に深まります。自信を持って進んでください。'
            ],
            study: [
              '知識の吸収力が驚異的なレベルに達しています。難関資格への挑戦も合格の兆しです。',
              '長年の疑問が氷解し、真理に近づけます。自分の可能性を信じて学習を続けましょう。'
            ],
            marriage: [
              '具体的な婚約や結婚の話がトントン拍子に進みます。生涯最高の幸福に包まれるでしょう。',
              'お互いの信頼が揺るぎない確信に変わります。周囲からの大いなる祝福に恵まれます。'
            ],
            relocation: [
              '東または南方向への転居に大いなる吉兆があります。新天地が運気をさらに跳ね上げます。',
              '理想とする住環境に巡り会う好機です。迷わず決断を下すことで福を招きます。'
            ]
          }
        },
        '中吉': {
          color: '#ff5c00',
          comments: {
            work: [
              '着実な進捗が見込めます。周囲の支援を受けることで、より大きな目標をクリアできます。',
              'リーダーシップを発揮することで信頼が高まります。協調性を重んじるのが成功の道です。'
            ],
            love: [
              '友人関係から恋人へと発展する兆しがあります。ゆっくりと時間をかけて育みましょう。',
              '気遣いと感謝の言葉が相手の心を打ちます。小さなサプライズが関係を前進させます。'
            ],
            study: [
              '日々の計画的な学習が効果を生みます。怠け心を捨て、毎日のルーティンを守るべし。',
              '苦手分野の克服に明るい兆しが見えます。基礎を今一度徹底的に復習してください。'
            ],
            marriage: [
              '双方の家族からの後押しが得られやすい時期です。具体的な将来設計を描きましょう。',
              '焦らず歩調を合わせることで、おのずと最良の選択肢とタイミングが浮き彫りになります。'
            ],
            relocation: [
              '利便性の高い場所への引っ越しが吉。生活習慣を改善させるための転居に最適です。',
              '急な転居計画でもスムーズに運ぶ運気です。まずは複数の不動産情報を見比べましょう。'
            ]
          }
        },
        '小吉': {
          color: '#d4af37',
          comments: {
            work: [
              '大きなトラブルはなく、安定した平穏な環境が続きます。スキルアップの土台を作れます。',
              '目の前の日常業務に集中することで、将来への確固たるアドバンテージを構築できます。'
            ],
            love: [
              '相手の何気ない一面に魅力を見出す機会があります。自然体で接するのが吉です。',
              '穏やかで穏和な対話が好感度を高めます。奇をてらわず普段通りのあなたで。'
            ],
            study: [
              '小さな発見が学習意欲を刺激します。学んだことを誰かに教えることで知識が定着します。',
              '図書館などの静かな環境での自習がはかどります。気が散る端末は片付けましょう。'
            ],
            marriage: [
              '互いの趣味や価値観についての理解が深まります。焦る必要はありません。',
              '小さなステップを一つずつクリアしていく段階です。二人の対話時間を増やしましょう。'
            ],
            relocation: [
              '自然豊かな場所や公園の近くへの移動が運気を回復させます。周囲の治安を要確認。',
              '現在地の近くで、少し条件を良くした引っ越しが良い結果を招く暗示があります。'
            ]
          }
        },
        '吉': {
          color: '#2e7d32',
          comments: {
            work: [
              '地道なルーティンワークが、予期せぬ局面で大きな武器となり評価を得るでしょう。',
              '無理に新領域に手を出さず、現行業務の最適化とスピード向上に努めると吉。'
            ],
            love: [
              '聞き手に回ることで好感度が急上昇します。相手の本音を丁寧に聞いてあげましょう。',
              '共通の趣味を持つグループ活動の中に、新しい親交の芽が隠されています。'
            ],
            study: [
              '暗記系科目の習得に最適な時期です。朝の時間を活用して学習効率を上げましょう。',
              '努力した分だけ結果に反映されます。裏を返せば、サボるとその分だけ後退します。'
            ],
            marriage: [
              '現実的な生活設計について語り合うのに適した日です。誠実さが実を結びます。',
              '互いの将来の希望が明確になり、少しずつ具体的な輪郭を持ち始めます。'
            ],
            relocation: [
              '実家の方向やなじみのある地域への移転に吉あり。安心感を得られる場所が最適です。',
              '転居そのものは良い変化を生みますが、契約書類の細部だけは二重に確認しましょう。'
            ]
          }
        },
        '末吉': {
          color: '#757575',
          comments: {
            work: [
              '最初は困難に見える仕事でも、後半から一気にペースを掴むことができます。忍耐の時。',
              '単独行動よりもチームワークに徹するのが無難。先輩のノウハウを吸収しましょう。'
            ],
            love: [
              '誤解が生じやすい時期ですが、真摯な言葉で早めに対処すればより深い関係になります。',
              '過度な期待を抱かず、相手のありのままを受け入れる度量が試される時です。'
            ],
            study: [
              '進捗が遅く感じられますが、ここで投げ出さない粘り強さが大きな実力差を生みます。',
              '学習環境の整理整頓（デスク周りの片付け）を最初に行うと、集中力が劇的に回復します。'
            ],
            marriage: [
              '焦って結論を出そうとすると衝突しがち。今は二人の共通の時間を増やすのみで十分です。',
              '将来に関する不安要素は、一つずつ冷静に話し合って解消していくプロセスが重要。'
            ],
            relocation: [
              '急いで転居を決める必要はありません。複数のエリアをじっくり下見しましょう。',
              '初期費用や各種手数料の計算を厳密に行い、予算超過を防ぐことが肝要です。'
            ]
          }
        },
        '凶': {
          color: '#333333',
          comments: {
            work: [
              'ミスを防ぐために二重三重の確認を怠らないでください。報告を密にすることが防御策です。',
              '独断での進行は非常に危険です。常に上司やチームの進捗と歩調を合わせてください。'
            ],
            love: [
              '一時的な感情論での発言は、不要な亀裂を生みます。一度深呼吸してから言葉を発しましょう。',
              '相手への過剰な干渉や束縛は、結果的に心の距離を遠ざける原因となります。'
            ],
            study: [
              '集中力が散漫になりやすい時期。時間を細かく区切るポモドーロ勉強法を取り入れましょう。',
              '基本をおろそかにしている可能性があります。応用を焦らず、基礎中の基礎に戻りましょう。'
            ],
            marriage: [
              '他者の勝手な意見や外野の噂話に惑わされないように。二人の信頼関係の強さが試されます。',
              '大きな決断は延期したほうが無難。まずは現状の課題を一つ一つ整理すること。'
            ],
            relocation: [
              '現在の住宅設備の不調を修繕することが、転居を急ぐよりも先決となる暗示です。',
              '怪しげな格安物件の誘い文句には裏があります。相場以下の条件には警戒してください。'
            ]
          }
        }
      };

      // 抽選確率用の配列化
      const fortuneKeys = Object.keys(fortuneDatabase);

      /**
       * 4. ヘルパー関数群（ロジックの疎結合化）
       */
      
      // 配列からランダムに1つの要素を返す関数
      function getRandomElement(array) {
        const randomIndex = Math.floor(Math.random() * array.length);
        return array[randomIndex];
      }

      // おみくじを引くメインのイベントハンドラ
      function drawFortune() {
        // ボタン連打によるバグ・連続実行を防ぐための制御（簡易ロック）
        if (btnDraw.disabled) return;
        btnDraw.disabled = true;

        // 矢印・初期ガイドの非表示化
        floatingArrow.style.display = 'none';
        placeholderText.style.display = 'none';
        fortuneResult.classList.remove('show');
        categoryList.classList.remove('show');

        // シャッフル（ドラムロール）アニメーションの開始
        displayArea.classList.add('shuffling');
        
        let counter = 0;
        const shuffleInterval = setInterval(function() {
          // ランダムに仮の運勢を表示して高速変化（演出）
          const tempFortune = getRandomElement(fortuneKeys);
          fortuneResult.innerText = tempFortune;
          fortuneResult.style.color = fortuneDatabase[tempFortune].color;
          fortuneResult.classList.add('show');
          counter++;
          
          if (counter > 10) { // 約1秒間シャッフル演出を行う
            clearInterval(shuffleInterval);
            displayArea.classList.remove('shuffling');
            finalizeResult();
          }
        }, 100);

        function finalizeResult() {
          // 運勢の最終決定
          const finalFortune = getRandomElement(fortuneKeys);
          const data = fortuneDatabase[finalFortune];

          // 決定した運勢に対応する各カテゴリ用ランダムコメントの抽出
          const selectedWork = getRandomElement(data.comments.work);
          const selectedLove = getRandomElement(data.comments.love);
          const selectedStudy = getRandomElement(data.comments.study);
          const selectedMarriage = getRandomElement(data.comments.marriage);
          const selectedRelocation = getRandomElement(data.comments.relocation);

          // DOMの更新
          fortuneResult.innerText = finalFortune;
          fortuneResult.style.color = data.color;

          commentWork.innerText = selectedWork;
          commentLove.innerText = selectedLove;
          commentStudy.innerText = selectedStudy;
          commentMarriage.innerText = selectedMarriage;
          commentRelocation.innerText = selectedRelocation;

          // アニメーション表示の適用
          setTimeout(function() {
            fortuneResult.classList.add('show');
            categoryList.classList.add('show');
            
            // ボタン制御解除と文言のアップデート
            btnDraw.disabled = false;
            btnDraw.innerHTML = 'もう一度引く <span class="inner-arrow">➔</span>';
          }, 50);
        }
      }

      // 5. イベントリスナー登録
      btnDraw.addEventListener('click', drawFortune);
    });
  </script>
</body>
</html>
