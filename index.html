<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豪華絢爛・参拝おみくじ</title>
    <style>
        body {
            font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
            background-color: #f2ebd9;
            background-image: radial-gradient(#e6dabe 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .omikuji-card {
            background: #fcfaf2;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(139, 0, 0, 0.15);
            text-align: center;
            max-width: 480px;
            width: 100%;
            border: 4px double #8a1717;
            position: relative;
        }

        h1 {
            color: #8a1717;
            margin-top: 0;
            font-size: 26px;
            letter-spacing: 4px;
            border-bottom: 1px solid #d4af37;
            padding-bottom: 10px;
        }

        /* 共通ボタンコンテナ・矢印 */
        .button-container {
            margin: 25px 0 15px 0;
            position: relative;
        }

        .arrow {
            font-size: 24px;
            color: #8a1717;
            animation: bounce 1s infinite;
            margin-bottom: 5px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .red-btn {
            background: linear-gradient(135deg, #bc2424, #8a1717);
            color: #fffde8;
            border: 2px solid #d4af37;
            padding: 14px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(138, 23, 23, 0.4);
            transition: all 0.2s ease;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .red-btn:hover {
            background: linear-gradient(135deg, #d32f2f, #a11b1b);
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(138, 23, 23, 0.5);
        }

        .end-btn {
            background-color: #f0e6d2;
            color: #5c4b37;
            border: 1px solid #c2b49a;
            padding: 10px 25px;
            font-size: 15px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
            font-weight: bold;
        }
        .end-btn:hover {
            background-color: #e4d7be;
        }

        /* --- 豪華なおみくじ箱の演出 --- */
        .animation-area {
            display: none;
            position: relative;
            height: 220px;
            margin: 20px 0;
        }

        .omikuji-box {
            width: 75px;
            height: 160px;
            background: linear-gradient(90deg, #96662d, #d7a15c 30%, #f3d4a0 50%, #d7a15c 70%, #784e1b);
            margin: 0 auto;
            position: relative;
            border-radius: 2px;
            box-shadow: 5px 10px 20px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 金の装飾金具（上下） */
        .omikuji-box::before, .omikuji-box::after {
            content: '';
            position: absolute;
            left: 0; width: 100%; height: 10px;
            background: linear-gradient(90deg, #aa7c11, #e5b93b, #fdefaa, #b38616);
            border-top: 1px solid #fdefaa;
            border-bottom: 1px solid #805c04;
            box-sizing: border-box;
        }
        .omikuji-box::before { top: 0; }
        .omikuji-box::after { bottom: 0; }

        /* 「御神籤」の縦書き文字 */
        .box-title {
            writing-mode: vertical-rl;
            text-orientation: upright;
            color: #222;
            font-weight: bold;
            font-size: 15px;
            letter-spacing: 6px;
            background: rgba(255, 255, 255, 0.4);
            padding: 10px 4px;
            border-radius: 3px;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .shake-animation {
            animation: shake 0.7s ease-in-out infinite;
        }
        @keyframes shake {
            0%, 100% { transform: rotate(0deg) translateY(0); }
            20% { transform: rotate(20deg) translateY(-12px); }
            40% { transform: rotate(-20deg) translateY(6px); }
            60% { transform: rotate(15deg) translateY(-6px); }
            80% { transform: rotate(-15deg) translateY(3px); }
        }

        /* 飛び出す棒 */
        .omikuji-stick {
            position: absolute;
            bottom: 100%; left: 50%;
            transform: translateX(-50%);
            width: 14px; height: 0px;
            background: linear-gradient(90deg, #e3cfa1, #fffde8);
            border: 1px solid #b5945b;
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
            transition: height 0.4s ease-out 0.7s;
            z-index: -1;
        }
        .pop-stick { height: 90px; }

        /* --- 豪華に折りたたまれたおみくじ紙 --- */
        .result-container {
            display: none;
            margin-top: 25px;
            background: linear-gradient(to bottom, #fffef7 0%, #f4f0e1 33%, #fffef7 34%, #f4f0e1 66%, #fffef7 67%, #fffef7 100%);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15), inset 0 0 20px rgba(0,0,0,0.05);
            padding: 30px 20px;
            position: relative;
            transform: scaleY(0);
            transform-origin: top;
            border: 3px solid #8a1717;
        }

        /* 豪華な二重枠の装飾 */
        .result-container::after {
            content: '';
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid #d4af37;
            pointer-events: none;
        }

        .paper-open { animation: openPaper 0.6s forwards ease-out; }
        @keyframes openPaper {
            0% { transform: scaleY(0); opacity: 0; }
            100% { transform: scaleY(1); opacity: 1; }
        }

        .fortune-result {
            font-size: 38px;
            font-weight: bold;
            color: #8a1717;
            margin: 0 0 20px 0;
            letter-spacing: 8px;
            border-bottom: 3px double #d4af37;
            display: inline-block;
            padding: 0 20px 5px 20px;
            text-shadow: 1px 1px 0px #fff;
        }

        .comment-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        .comment-table tr { border-bottom: 1px dashed #dcd1ba; }
        .comment-table tr:last-child { border-bottom: none; }
        .category-name {
            font-weight: bold;
            color: #8a1717;
            padding: 12px 5px;
            width: 75px;
            vertical-align: top;
        }
        .category-text {
            padding: 12px 10px;
            color: #222;
            font-size: 14px;
            line-height: 1.6;
        }

        /* ⛩️ 追加：神様セクションのデザイン（読みやすく余白多め） */
        .god-separator {
            border: 0;
            height: 1px;
            background-image: linear-gradient(to right, transparent, #d4af37, transparent);
            margin: 40px 0 25px 0;
        }
        .god-box {
            text-align: left;
            padding: 10px 5px 20px 5px;
        }
        .god-title {
            font-size: 13px;
            color: #8a1717;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: bold;
            text-align: center;
        }
        .god-name {
            font-size: 21px;
            color: #222;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .god-item {
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .god-label {
            font-weight: bold;
            color: #8a1717;
            font-size: 14px;
            display: block;
            margin-bottom: 6px;
            border-bottom: 1px dashed #c2b49a;
            padding-bottom: 3px;
        }
        .god-value {
            font-size: 14px;
            color: #333;
            padding-left: 2px;
            display: block;
        }

        /* --- カレンダー＆スタンプエリア --- */
        .calendar-container {
            display: none;
            margin-top: 25px;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }

        .calendar-title {
            font-size: 18px;
            color: #5c4b37;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .calendar-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border: 1px solid #c2b49a;
        }
        .calendar-table th, .calendar-table td {
            border: 1px solid #e2dacb;
            padding: 10px 5px;
            text-align: center;
            font-size: 14px;
            position: relative;
            width: 14.28%;
        }
        .calendar-table th {
            background-color: #f7f3eb;
            color: #5c4b37;
        }
        .calendar-table td { height: 45px; box-sizing: border-box; }
        
        /* 日曜日の日付数字を赤にするスタイル */
        .sunday-text {
            color: #bc2424 !important;
        }

        /* 今日の日付の強調 */
        .today-cell {
            background-color: #fffde8;
            font-weight: bold;
            outline: 2px solid #d4af37;
            outline-offset: -2px;
        }

        /* 済スタンプのデザインとアニメーション */
        .stamp-done {
            position: absolute;
            top: 50%; left: 50%;
            width: 32px; height: 32px;
            border: 2px solid #bc2424;
            color: #bc2424;
            border-radius: 50%;
            font-size: 15px;
            font-weight: bold;
            line-height: 28px;
            text-align: center;
            transform: translate(-50%, -50%) scale(3);
            opacity: 0;
            user-select: none;
            background: rgba(255,255,255,0.8);
            box-sizing: border-box;
        }

        .stamp-animation {
            animation: stampPunch 0.4s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes stampPunch {
            0% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
            80% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.9; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(-15deg); opacity: 0.85; }
        }
    </style>
</head>
<body>

<div class="omikuji-card">
    <div id="startScreen">
        <h1>✨ 参拝開運御神籤 ✨</h1>
        <p>心を落ち着かせ、おみくじをお引きください</p>
        <div class="button-container">
            <div class="arrow">⬇</div>
            <button class="red-btn" id="startBtn">おみくじを引く</button>
        </div>
    </div>

    <div class="animation-area" id="animationArea">
        <div class="omikuji-box" id="omikujiBox">
            <div class="box-title">御神籤</div>
            <div class="omikuji-stick" id="omikujiStick"></div>
        </div>
    </div>

    <div class="result-container" id="resultContainer">
        <div style="font-size: 14px; color: #666;">謹んで運勢をお送りいたします</div>
        <div class="fortune-result" id="fortuneResult">-</div>

        <table class="comment-table">
            <tr><td class="category-name">💼 仕事</td><td class="category-text" id="jobComment"></td></tr>
            <tr><td class="category-name">❤️ 恋愛</td><td class="category-text" id="loveComment"></td></tr>
            <tr><td class="category-name">✏️ 勉学</td><td class="category-text" id="studyComment"></td></tr>
            <tr><td class="category-name">💍 結婚</td><td class="category-text" id="marriageComment"></td></tr>
            <tr><td class="category-name">📦 転居</td><td class="category-text" id="moveComment"></td></tr>
        </table>

        <hr class="god-separator">
        <div class="god-box">
            <div class="god-title">━ 本日あなたと縁のある神様 ━</div>
            <div class="god-name" id="godName">-</div>
            
            <div class="god-item">
                <span class="god-label">⛩️ 主な神社（二社）</span>
                <span class="god-value" id="godShrine">-</span>
            </div>
            
            <div class="god-item">
                <span class="god-label">📜 経歴・功績</span>
                <span class="god-value" id="godHistory">-</span>
            </div>
            
            <div class="god-item">
                <span class="god-label">✨ ご利益</span>
                <span class="god-value" id="godBenefit">-</span>
            </div>
        </div>

        <div class="button-container">
            <div class="arrow">⬇</div>
            <button class="red-btn" id="retryBtn">もう一度引く</button>
        </div>
        <div>
            <button class="end-btn" id="endBtn">終了する</button>
        </div>
    </div>

    <div class="calendar-container" id="calendarContainer">
        <div class="calendar-title" id="calendarMonthTitle">令和○年○月 参拝記録</div>
        <table class="calendar-table">
            <thead>
                <tr>
                    <th style="color:#e53935;">日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th style="color:#1e88e5;">土</th>
                </tr>
            </thead>
            <tbody id="calendarBody">
            </tbody>
        </table>
        <button class="end-btn" id="backToStartBtn">最初の画面に戻る</button>
    </div>
</div>

        { name: "神武天皇 (ジンムテンノウ)", shrine: "橿原神宮（奈良県）、宮崎神宮（宮崎県）", history: "日本の初代天皇。宮崎の地から東へ進む過酷な旅（東征）を続け、数々の困難を乗り越えて奈良の地で即位し、日本を建国しました。", benefit: "必勝祈願、開運招福、延命長寿" },
        { name: "木花之佐久夜毘売 (コノハナノサクヤビメ)", shrine: "富士山本宮浅間大社（静岡県）、霧島神宮（鹿児島県）", history: "桜の花が咲き誇るような美貌を持つ女神。貞操を疑われた際、身の潔白を示すために自ら産屋に火を放ち、その炎の中で3人の子を無事出産しました。", benefit: "安産・子宝、火災除け、良縁祈願" },
        { name: "建御雷神 (タケミカヅチノカミ)", shrine: "鹿島神宮（茨城県）、春日大社（奈良県）", history: "雷神であり、最強の武神。国譲りの交渉で力比べを挑んできた相手を圧倒し、交渉を大成功に導きました。これが相撲の起源とされます。", benefit: "武芸上達、勝負運上昇、旅行安全" },
        { name: "宇迦之御魂神 (ウカノミタマノカミ)", shrine: "伏見稲荷大社（京都府）、笠間稲荷神社（茨城県）", history: "お米や食べ物を司る女神。「お稲荷様」として全国で最も多く祀られ、古くから日本人の日々の食と暮らしを支え続けています。", benefit: "商売繁盛、五穀豊穣、家内安全" },
        { name: "菅原道真 (スガワラノミチザネ)", shrine: "太宰府天満宮（福岡県）、北野天満宮（京都府）", history: "平安時代に学者・政治家として最高峰の活躍をするも無実の罪で左遷されました。その並外れた知識・才能から、のちに「学問の神様」となりました。", benefit: "学業成就、試験合格、文芸上達" },
        { name: "誉田別命 (ホンダワケノミコト)", shrine: "宇佐神宮（大分県）、石清水八幡宮（京都府）", history: "応神天皇の神霊であり「八幡様」として有名。大陸の文化を取り入れ産業を発展させ、のちに清和源氏ら武家から武運の神と仰がれました。", benefit: "武運長久、勝負運、出世開運" },
        { name: "大山津見神 (オオヤマツミノカミ)", shrine: "大山祇神社（愛媛県）、三島大社（静岡県）", history: "日本のすべての山を支配し司る山の総大将。コノハナノサクヤビメの父親でもあり、山林の守護だけでなくお酒造りの祖神としても有名です。", benefit: "山林守護、商売繁盛、金運上昇" },
        { name: "猿田毘古神 (サルタヒコノカミ)", shrine: "椿大神社（三重県）、猿田彦神社（三重県）", history: "天孫降臨の際、神々の進むべき道を先導して案内した神様。その功績から、あらゆる物事を良い方向へ導く「みちひらき」の神とされます。", benefit: "交通安全、物事の道開き、建築安全" },
        { name: "少彦名神 (スクナヒコナノカミ)", shrine: "少彦名神社（大阪府）、神田明神（東京都）", history: "大国主神と協力して日本の国造りを行った小さな知恵の神様。医薬の道を広め、病気から人々を救う知識や温泉の文化を伝えました。", benefit: "病気平癒、身体健康、醸造安全" },
        { name: "日本武尊 (ヤマトタケルノミコト)", shrine: "大鳥大社（大阪府）、熱田神宮（愛知県）", history: "類いまれなる武勇を持ち、西日本の熊襲や東日本の蝦夷を次々と平定した、日本神話最大の伝説的ヤマトの英雄です。", benefit: "開運出世、除災招福、国土安泰" }
    ];

    function getRandomElement(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    // おみくじを引く演出（原案を完全維持）
    function playOmikuji() {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('resultContainer').style.display = 'none';
        document.getElementById('calendarContainer').style.display = 'none';
        document.getElementById('resultContainer').classList.remove('paper-open');
        document.getElementById('animationArea').style.display = 'block';
        
        const box = document.getElementById('omikujiBox');
        const stick = document.getElementById('omikujiStick');
        
        box.classList.remove('shake-animation');
        stick.classList.remove('pop-stick');
        void box.offsetWidth; 
        
        box.classList.add('shake-animation');

        setTimeout(() => {
            box.classList.remove('shake-animation');
            stick.classList.add('pop-stick');
        }, 700);

        setTimeout(() => {
            document.getElementById('animationArea').style.display = 'none';
            
            // 運勢のランダム決定
            const selectedFortune = getRandomElement(fortunes);
            const categoryData = comments[selectedFortune];

            document.getElementById('fortuneResult').textContent = selectedFortune;
            document.getElementById('jobComment').textContent = getRandomElement(categoryData.job);
            document.getElementById('loveComment').textContent = getRandomElement(categoryData.love);
            document.getElementById('studyComment').textContent = getRandomElement(categoryData.study);
            document.getElementById('marriageComment').textContent = getRandomElement(categoryData.marriage);
            document.getElementById('moveComment').textContent = getRandomElement(categoryData.move);

            // ⛩️ 神様のランダム決定を追加
            const selectedGod = getRandomElement(godData);
            document.getElementById('godName').textContent = selectedGod.name;
            document.getElementById('godShrine').textContent = selectedGod.shrine;
            document.getElementById('godHistory').textContent = selectedGod.history;
            document.getElementById('godBenefit').textContent = selectedGod.benefit;

            const resultBox = document.getElementById('resultContainer');
            resultBox.style.display = 'block';
            resultBox.classList.add('paper-open');

            // 今日おみくじを引いた事実を記憶（LocalStorageに保存）
            const now = new Date();
            const storageKey = `stamp-${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;
            localStorage.setItem(storageKey, 'true');
            
        }, 1300);
    }

    // カレンダーの動的生成とスタンプ演出（自動更新＆過去保存対応）
    function showCalendarAndStamp() {
        document.getElementById('resultContainer').style.display = 'none';
        document.getElementById('calendarContainer').style.display = 'block';

        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth(); // 0-11
        const todayIdx = now.getDate();

        // 🛠️ 元号（令和）計算
        const reiwaYear = year - 2018;
        document.getElementById('calendarMonthTitle').textContent = `令和${reiwaYear}年${month + 1}月 参拝記録`;

        // カレンダーの日付ロジック
        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();

        const tbody = document.getElementById('calendarBody');
        tbody.innerHTML = '';

        let date = 1;
        for (let i = 0; i < 6; i++) { // 最大6行
            let row = document.createElement('tr');
            let hasCells = false;

            for (let j = 0; j < 7; j++) {
                let cell = document.createElement('td');
                
                // 日曜日の列（j === 0）なら数字を赤にするクラスをあらかじめ準備
                if (j === 0) {
                    cell.classList.add('sunday-text');
                }

                if (i === 0 && j < firstDay) {
                    cell.textContent = '';
                } else if (date > lastDate) {
                    cell.textContent = '';
                } else {
                    cell.textContent = date;
                    
                    // 今日の日付の強調
                    if (date === todayIdx) {
                        cell.classList.add('today-cell');
                    }

                    // 🛠️ 過去にスタンプが押されている、または今日引いた場合、スタンプ枠を生成
                    const storageKey = `stamp-${year}-${month + 1}-${date}`;
                    if (localStorage.getItem(storageKey) === 'true') {
                        // 今日の日付ならアニメーション用のIDを付与、過去の日付なら最初から表示
                        if (date === todayIdx) {
                            cell.innerHTML = `${date}<div class="stamp-done" id="todayStamp">済</div>`;
                        } else {
                            cell.innerHTML = `${date}<div class="stamp-done stamp-animation">済</div>`;
                        }
                    }
                    
                    date++;
                    hasCells = true;
                }
                row.appendChild(cell);
            }
            if (!hasCells) break;
            tbody.appendChild(row);
        }

        // カレンダー表示から一瞬遅らせて、今日引いた箇所のスタンプをポンッと押す
        setTimeout(() => {
            const stamp = document.getElementById('todayStamp');
            if (stamp) stamp.classList.add('stamp-animation');
        }, 300);
    }

    // イベント設定
    document.getElementById('startBtn').addEventListener('click', playOmikuji);
    document.getElementById('retryBtn').addEventListener('click', playOmikuji);
    document.getElementById('endBtn').addEventListener('click', showCalendarAndStamp);
    
    // 完全にリセットして戻る
    document.getElementById('backToStartBtn').addEventListener('click', function() {
        document.getElementById('calendarContainer').style.display = 'none';
        document.getElementById('startScreen').style.display = 'block';
    });
</script>
